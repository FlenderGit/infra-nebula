configs:
  nginx_config:
    file: ./nginx.conf
  nats_config:
    file: ./nats-server.conf

secrets:
  db_password:
    external: true
  jwt_private_key:
    external: true
  s3_access_key:
    external: true
  s3_secret_key:
    external: true
  grafana_user:
    external: true
  grafana_password:
    external: true

volumes:
  db_data:
  rustfs-data:
  redis_data:
  lgtm-data:
  portainer-data:
  redis-data:
  grafana-data:

networks:
  traefik_public:
    driver: overlay
    attachable: true
    ipam:
      config:
        - subnet: 10.20.1.0/24
  net-data:
    driver: overlay
    internal: true
    ipam:
      config:
        - subnet: 10.20.2.0/24
  monitoring:
    driver: overlay
    internal: true
    ipam:
      config:
        - subnet: 10.20.5.0/24
  agent-network:
    driver: overlay
    internal: true
    ipam:
      config:
        - subnet: 10.20.3.0/24
  nats-cluster:
    driver: overlay
    internal: true
    ipam:
      config:
        - subnet: 10.20.4.0/24

services:
  # ------
  # Reverse proxy
  # ------
  traefik:
    image: traefik:3.6.9
    environment:
      - DOCKER_API_VERSION=1.44
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik_public
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
    command:
      - "--providers.swarm=true"
      - "--providers.swarm.endpoint=unix:///var/run/docker.sock"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--api.dashboard=true"

  # ------
  # Apps: Frontend (nginx + html static)
  # ------
  frontend:
    image: ${REGISTRY}/nebula-frontend:1.0.0
    networks:
      - traefik_public
      - monitoring
    configs:
      - source: nginx_config
        target: /etc/nginx/nginx.conf
        mode: 0444
    deploy:
      replicas: 2
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.svelte_app.rule=Host(`svelte.${DOMAIN}`)"
        - "traefik.http.routers.svelte_app.entrypoints=web"
        - "traefik.http.services.svelte_app.loadbalancer.server.port=80"
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 5s
        failure_action: continue
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          memory: 128M
          cpus: "0.50"
        reservations:
          memory: 16M
          cpus: "0.10"
      placement:
        constraints:
          - node.role == worker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  # ------
  # Apps: Auth API
  # ------
  api_auth:
    image: ${REGISTRY}/nebula-api-auth:1.0.1
    environment:
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_HOST=${DB_HOST}
    secrets:
      - db_password
      - jwt_private_key
    read_only: true
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true

    networks:
      - traefik_public
      - net-data
      - monitoring
    deploy:
      replicas: 2
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.api_auth.rule=Host(`auth.${DOMAIN}`)"
        - "traefik.http.routers.api_auth.entrypoints=web"
        - "traefik.http.services.api_auth.loadbalancer.server.port=8000"
        - "traefik.docker.network=nebula_traefik_public"

        - "traefik.http.middlewares.api_auth-ratelimit.ratelimit.average=20"
        - "traefik.http.middlewares.api_auth-ratelimit.ratelimit.burst=10"
        - "traefik.http.middlewares.api_auth-ratelimit.ratelimit.period=1m"
      update_config:
        parallelism: 1
        delay: 15s
        failure_action: rollback
        order: start-first

      rollback_config:
        parallelism: 1
        delay: 5s
        failure_action: continue
        order: stop-first

      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      placement:
        constraints:
          - node.role == worker
        preferences:
          - spread: node.id
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  api_crud:
    image: ${REGISTRY}/nebula-api-crud:1.0.2
    environment:
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_HOST=${DB_HOST}
      - S3_BUCKET=${S3_BUCKET}
      - S3_HOST=${S3_HOST}
    secrets:
      - db_password
      - s3_access_key
      - s3_secret_key
    networks:
      - traefik_public
      - net-data
      - monitoring
    read_only: true
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    deploy:
      replicas: 2
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.api_crud.rule=Host(`api.${DOMAIN}`)"
        - "traefik.http.routers.api_crud.entrypoints=web"
        - "traefik.http.services.api_crud.loadbalancer.server.port=8000"
        - "traefik.docker.network=nebula_traefik_public"
      update_config:
        parallelism: 1
        delay: 20s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 5s
        failure_action: continue
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 180s
      resources:
        limits:
          memory: 256M
          cpus: "1.00"
        reservations:
          memory: 64M
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ------
  # Queue Worker
  # ------
  queue_worker:
    image: ${REGISTRY}/nebula-queue-worker:1.0.0
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    networks:
      - net-data
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
        order: stop-first
      rollback_config:
        parallelism: 1
        delay: 10s
        failure_action: continue
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 15s
        max_attempts: 5
        window: 300s
      resources:
        limits:
          memory: 256M
          cpus: "1.00"
        reservations:
          memory: 64M
          cpus: "0.25"
      placement:
        constraints:
          - node.role == worker
  surreal:
    image: surrealdb/surrealdb:latest
    command: start --bind 0.0.0.0:8000 --addr surreal-node --user root --pass rootpass --distribute --kvs tikv
    secrets:
      - db_password
    environment:
      - SURREAL_USER=root
      - SURREAL_PASS_FILE=/run/secrets/db_password
      - SURREAL_CAPS_ALLOW_NET=false
      - SURREAL_CAPS_ALLOW_FUNCS=false
    networks:
      - net-data
    volumes:
      - db_data:/surreal/data
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 20s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
        failure_action: continue
      restart_policy:
        condition: on-failure
        delay: 15s
        max_attempts: 5
        window: 300s
      placement:
        constraints:
          - node.role == worker
        preferences:
          - spread: node.id
      resources:
        limits:
          memory: 512M
          cpus: "1.00"
        reservations:
          memory: 128M
          cpus: "0.25"
    ports:
      - "8000:8000"

  # ------
  # Stockage: S3
  # -----
  rustfs:
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_CONSOLE_ENABLE: "true"
    entrypoint:
      - sh
      - -c
      - |
        export RUSTFS_ACCESS_KEY=$$(cat /run/secrets/s3_access_key) &&
        export RUSTFS_SECRET_KEY=$$(cat /run/secrets/s3_secret_key) &&
        exec /entrypoint.sh rustfs
    secrets:
      - s3_access_key
      - s3_secret_key
    volumes:
      - rustfs-data:/data
    networks:
      - traefik_public
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.rustfs.rule=Host(`s3.${DOMAIN}`)"
        - "traefik.http.routers.rustfs.entrypoints=web"
        - "traefik.http.services.rustfs.loadbalancer.server.port=9001"
        - "traefik.docker.network=nebula_traefik_public"
  # pg-backup:
  #   image: eeshugerman/postgres-backup-s3:16
  #   environment:
  #     SCHEDULE: "@daily"
  #     S3_REGION: us-east-1
  #     S3_ENDPOINT: ${S3_HOST}
  #     S3_BUCKET: ${S3_BUCKET}
  #     S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
  #     S3_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
  #     S3_PREFIX: postgres
  #     POSTGRES_HOST: haproxy
  #     POSTGRES_PORT: 5000
  #     POSTGRES_DATABASE: postgres
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: ${DB_PASSWORD}
  #   networks:
  #     - net-data
  #   deploy:
  #     replicas: 1
  #     restart_policy:
  #       condition: any
  #       delay: 24h

  # ------
  # Monitoring: Prometheus, Loki, Tempo & Grafana
  # ------
  otel-lgtm:
    image: grafana/otel-lgtm:0.6.0
    environment:
      - GF_SECURITY_ADMIN_USER__FILE=/run/secrets/grafana_user
      - GF_SECURITY_ADMIN_PASSWORD__FILE=/run/secrets/grafana_password
      - GF_SERVER_ROOT_URL=https://grafana.${DOMAIN}
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SECURITY_DISABLE_GRAVATAR=true
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=production
    secrets:
      - grafana_user
      - grafana_password
    volumes:
      - lgtm-data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - target: 3000
        published: 3000
        protocol: tcp
        mode: host
      - target: 4317
        published: 4317
        protocol: tcp
        mode: host
      - target: 4318
        published: 4318
        protocol: tcp
        mode: host
      - target: 9090
        published: 9090
        protocol: tcp
        mode: host
    networks:
      - monitoring
    security_opt:
      - no-new-privileges:true
    deploy:
      mode: global
      placement:
        constraints:
          - node.platform.os == linux
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.grafana.rule=Host(`grafana.localhost`)"
        - "traefik.http.routers.grafana.entrypoints=web"
        - "traefik.http.services.grafana.loadbalancer.server.port=3000"
        - "traefik.docker.network=nebula_traefik_public"

  # ------
  # Monitoring: Portainer
  # -----
  portainer:
    image: portainer/portainer-ce:latest
    command: -H tcp://tasks.portainer-agent:9001 --tlsskipverify
    volumes:
      - portainer-data:/data
    networks:
      - agent-network
      - traefik_public
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.portainer.rule=Host(`portainer.${DOMAIN}`)"
        - "traefik.http.routers.portainer.entrypoints=web"
        - "traefik.http.services.portainer.loadbalancer.server.port=9000"
        - "traefik.docker.network=nebula_traefik_public"
  portainer-agent:
    image: portainer/agent:2.39.0-alpine
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    networks:
      - agent-network
    deploy:
      mode: global
      placement:
        constraints:
          - node.platform.os == linux

  redis-master:
    image: "redis:8-alpine"
    command: redis-server --requirepass yourpassword --appendonly yes
    volumes:
      - redis_data:/bitnami/redis/data
    networks:
      - net-data
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]

  redis-replica:
    image: "redis:8-alpine"
    command: redis-server --requirepass yourpassword --replicaof redis-master 6379 --masterauth yourpassword
    networks:
      - net-data
    deploy:
      replicas: 2

  redis-sentinel:
    image: "redis:8-alpine"
    command: redis-sentinel /etc/redis/sentinel.conf
    networks:
      - net-data
    deploy:
      replicas: 3
      placement:
        max_replicas_per_node: 1

  # ------------------
  #  Message Broker
  #  Pub/Sub
  # ------------------
  nats-1:
    image: nats:2.12-alpine
    command: "-c /etc/nats/nats.conf"
    environment:
      - NATS_NODE_NAME=nats-node-1
    configs:
      - source: nats_config
        target: /etc/nats/nats.conf
    networks:
      - nats-cluster
    deploy:
      placement:
        constraints: [node.labels.nats == 1]

  nats-2:
    image: nats:2.12-alpine
    command: "-c /etc/nats/nats.conf"
    environment:
      - NATS_NODE_NAME=nats-node-2
    configs:
      - source: nats_config
        target: /etc/nats/nats.conf
    networks:
      - nats-cluster
    deploy:
      placement:
        constraints: [node.labels.nats == 2]

  nats-3:
    image: nats:2.12-alpine
    command: "-c /etc/nats/nats.conf"
    environment:
      - NATS_NODE_NAME=nats-node-3
    configs:
      - source: nats_config
        target: /etc/nats/nats.conf
    networks:
      - nats-cluster
    deploy:
      placement:
        constraints: [node.labels.nats == 3]
