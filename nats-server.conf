server_name: $NATS_NODE_NAME
host: 0.0.0.0
port: 4222
http_port: 8222

cluster {
    name: nats-cluster
    host: 0.0.0.0
    port: 6222
    advertise: "$NATS_NODE_NAME:6222"

    routes: [
        nats-route://nats-node-1:6222
        nats-route://nats-node-2:6222
        nats-route://nats-node-3:6222
    ]

    connect_retries: 30
}
